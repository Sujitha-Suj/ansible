- name: variables on prompt 
  hosts: localhost
  connection: localhost
  vars_prompt: 
    - name: username
      prompt: please enter the username
      private: false
  
    - name: password
      prompt: please enter the password
      private: true
  tasks:
  - name: print the information
    debug:
      msg: "Username is: {{ username }}, password is: {{ password }}"

