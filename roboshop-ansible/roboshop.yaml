- name: roboshop instances management
  hosts: local
  connection: local
  vars:
    instances: ["mangodb", "redis", "mysql", "rabbitmq"]
    image_id: ami-0220d79f3f480ecf5
  tasks: 
  - name: create the aws instances
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      name: "roboshop-{{ item }}"
      image_id: "{{ image_id }}"
      security_groups:
      - "roboshop-{{ item }}"
      - ansible-common
    loop: "{{ instances }}"
    register: ec2_output

 # - name: print ec2_output
 #  debug:
 #    msg: "{{ ec2_output }}"

  - name: create route53 record
    debug: 
      msg: "Instance_name: {{ item.item }} PrivateIP: {{ item.instances[0].private_ip_address }}"
    loop: "{{ ec2_output.results }}"